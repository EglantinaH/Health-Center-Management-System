<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="1400" height="420" fill="white"/>
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
  .ll { font-size:12px; font-weight:bold; }
  .tl { font-size:11px; }
  .ts { font-size:10px; fill:#444; }
  .gl { font-size:10px; fill:#333; }
  .ttl { font-size:12px; font-weight:bold; }
</style>

<!-- Pool border -->
<rect x="30" y="15" width="1355" height="395" rx="4" fill="none" stroke="#111" stroke-width="2"/>
<rect x="30" y="15" width="32" height="395" fill="#ddd" stroke="#111" stroke-width="1"/>
<text class="ll" x="46" y="213" text-anchor="middle" transform="rotate(-90,46,213)">BPMN 1: Patient Registration &amp; Appointment Scheduling</text>

<!-- Receptionist lane y=15..165 -->
<rect x="62" y="15" width="1323" height="150" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="15" width="52" height="150" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="90" text-anchor="middle" transform="rotate(-90,88,90)">Receptionist</text>

<!-- System lane y=165..305 -->
<rect x="62" y="165" width="1323" height="140" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="165" width="52" height="140" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="235" text-anchor="middle" transform="rotate(-90,88,235)">System</text>

<!-- Patient lane y=305..410 -->
<rect x="62" y="305" width="1323" height="105" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="305" width="52" height="105" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="358" text-anchor="middle" transform="rotate(-90,88,358)">Patient</text>

<!-- ===== RECEPTIONIST LANE ===== -->
<!-- Start event -->
<circle cx="140" cy="90" r="14" fill="white" stroke="#111" stroke-width="2"/>
<text class="tl" x="140" y="115" text-anchor="middle">Login</text>

<!-- Task: Search Patient -->
<rect x="170" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="228" y="84" text-anchor="middle">Search Patient</text>
<text class="ts" x="228" y="98" text-anchor="middle">(Name / ID)</text>
<text class="ts" x="228" y="111" text-anchor="middle">US-02</text>

<!-- Gateway: Patient Found? -->
<polygon points="320,90 348,62 376,90 348,118" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="gl" x="348" y="86" text-anchor="middle">Patient</text>
<text class="gl" x="348" y="98" text-anchor="middle">Found?</text>

<!-- Task: Register New Patient -->
<rect x="420" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="478" y="82" text-anchor="middle">Register New</text>
<text class="tl" x="478" y="95" text-anchor="middle">Patient</text>
<text class="ts" x="478" y="108" text-anchor="middle">US-01</text>

<!-- Task: Enter Patient Details -->
<rect x="555" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="613" y="82" text-anchor="middle">Enter Patient</text>
<text class="tl" x="613" y="95" text-anchor="middle">Details &amp; Cat.</text>

<!-- Task: Add Insurance Info -->
<rect x="690" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="748" y="82" text-anchor="middle">Add Insurance</text>
<text class="tl" x="748" y="95" text-anchor="middle">Info &amp; Submit</text>

<!-- Task: Schedule Appointment -->
<rect x="825" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="883" y="82" text-anchor="middle">Schedule Appt</text>
<text class="ts" x="883" y="95" text-anchor="middle">US-03</text>

<!-- Task: Select Doctor/Date -->
<rect x="960" y="62" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="1018" y="82" text-anchor="middle">Select Doctor,</text>
<text class="tl" x="1018" y="95" text-anchor="middle">Date &amp; Slot</text>

<!-- Task: Confirm Booking -->
<rect x="1095" y="62" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="1150" y="82" text-anchor="middle">Confirm</text>
<text class="tl" x="1150" y="95" text-anchor="middle">Booking</text>

<!-- End event (done) -->
<circle cx="1270" cy="90" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="1270" y="115" text-anchor="middle">Done</text>

<!-- ===== SYSTEM LANE ===== -->
<!-- Task: Validate Search -->
<rect x="170" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="228" y="210" text-anchor="middle">Validate Search</text>
<text class="tl" x="228" y="224" text-anchor="middle">&amp; Return Recs</text>

<!-- Task: Validate Fields & Generate ID -->
<rect x="420" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="478" y="207" text-anchor="middle">Validate Fields</text>
<text class="tl" x="478" y="220" text-anchor="middle">&amp; Generate</text>
<text class="tl" x="478" y="233" text-anchor="middle">Patient ID</text>

<!-- Task: Create Empty Medical Record -->
<rect x="555" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="613" y="210" text-anchor="middle">Create Empty</text>
<text class="tl" x="613" y="224" text-anchor="middle">Medical Record</text>

<!-- Task: Check Doctor Availability -->
<rect x="690" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="748" y="207" text-anchor="middle">Check Doctor</text>
<text class="tl" x="748" y="220" text-anchor="middle">Availability</text>
<text class="ts" x="748" y="233" text-anchor="middle">NFR-02</text>

<!-- Task: Reserve Slot -->
<rect x="825" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="883" y="207" text-anchor="middle">Reserve Slot &amp;</text>
<text class="tl" x="883" y="220" text-anchor="middle">Prevent Double</text>
<text class="tl" x="883" y="233" text-anchor="middle">Booking</text>

<!-- Task: Save Appointment & Audit Log -->
<rect x="1095" y="190" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="1153" y="207" text-anchor="middle">Save Appt &amp;</text>
<text class="tl" x="1153" y="220" text-anchor="middle">Audit Log</text>
<text class="ts" x="1153" y="233" text-anchor="middle">NFR-08</text>

<!-- ===== PATIENT LANE ===== -->
<!-- Task: Receive Confirmation On-Screen -->
<rect x="555" y="322" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="613" y="341" text-anchor="middle">Receive</text>
<text class="tl" x="613" y="354" text-anchor="middle">Confirmation</text>
<text class="ts" x="613" y="366" text-anchor="middle">(On-Screen)</text>

<!-- Task: Receive SMS Confirmation -->
<rect x="825" y="322" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="883" y="339" text-anchor="middle">Receive SMS</text>
<text class="tl" x="883" y="352" text-anchor="middle">Confirmation</text>
<text class="ts" x="883" y="364" text-anchor="middle">US-03</text>

<!-- End event: Notified -->
<circle cx="1000" cy="348" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="1000" y="373" text-anchor="middle">Notified</text>

<!-- ===== SEQUENCE FLOWS ===== -->
<line x1="154" y1="90" x2="170" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="228" y1="118" x2="228" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="285" y1="90" x2="320" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- YES branch: over the top arc -->
<path d="M376 90 L398 90 L398 50 L420 50 L420 62" fill="none" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="392" y="45">Yes (new)</text>

<!-- NO branch: skips to schedule appointment -->
<path d="M348 118 L348 150 L883 150 L883 118" fill="none" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="360" y="146">No (exists)</text>

<line x1="535" y1="90" x2="555" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="478" y1="118" x2="478" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="535" y1="218" x2="555" y2="218" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="670" y1="90" x2="690" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="613" y1="246" x2="613" y2="322" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="748" y1="118" x2="748" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="805" y1="90" x2="825" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="805" y1="218" x2="825" y2="218" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="883" y1="246" x2="883" y2="322" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="940" y1="90" x2="960" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="1075" y1="90" x2="1095" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="1150" y1="118" x2="1150" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="1205" y1="90" x2="1256" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="940" y1="348" x2="986" y2="348" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Title -->
<text class="ttl" x="700" y="408" text-anchor="middle">BPMN 1: Patient Registration &amp; Appointment Scheduling (US-01 · US-02 · US-03)</text>
</svg>
