<text class="ll" x="88" y="455" text-anchor="middle" transform="rotate(-90,88,455)">Patient / Parent</text>

<!-- ===== NURSE LANE ===== -->
<circle cx="135" cy="78" r="14" fill="white" stroke="#111" stroke-width="2"/>
<text class="tl" x="135" y="103" text-anchor="middle">Open Patient</text>

<rect x="162" y="50" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
