<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="570" viewBox="0 0 1400 570" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="1400" height="570" fill="white"/>
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
  .ll { font-size:12px; font-weight:bold; }
  .tl { font-size:11px; }
  .ts { font-size:10px; fill:#444; }
  .gl { font-size:10px; fill:#333; }
  .ttl { font-size:12px; font-weight:bold; }
</style>

<!-- Pool border -->
<rect x="30" y="15" width="1355" height="545" rx="4" fill="none" stroke="#111" stroke-width="2"/>
<rect x="30" y="15" width="32" height="545" fill="#ddd" stroke="#111" stroke-width="1"/>
<text class="ll" x="46" y="288" text-anchor="middle" transform="rotate(-90,46,288)">BPMN 2: Clinical Consultation – Diagnosis, Prescription &amp; Lab Results</text>

<!-- Doctor lane y=15..165 -->
<rect x="62" y="15" width="1323" height="150" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="15" width="52" height="150" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="90" text-anchor="middle" transform="rotate(-90,88,90)">Doctor</text>

<!-- System lane y=165..295 -->
<rect x="62" y="165" width="1323" height="130" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="165" width="52" height="130" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="230" text-anchor="middle" transform="rotate(-90,88,230)">System</text>

<!-- Lab Technician lane y=295..420 -->
<rect x="62" y="295" width="1323" height="125" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="295" width="52" height="125" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="358" text-anchor="middle" transform="rotate(-90,88,358)">Lab Technician</text>

<!-- Pharmacy lane y=420..560 -->
<rect x="62" y="420" width="1323" height="140" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="420" width="52" height="140" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="490" text-anchor="middle" transform="rotate(-90,88,490)">Pharmacy</text>

<!-- ===== DOCTOR LANE ===== -->
<circle cx="135" cy="90" r="14" fill="white" stroke="#111" stroke-width="2"/>
<text class="tl" x="135" y="115" text-anchor="middle">Open Patient</text>

<rect x="162" y="62" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="217" y="82" text-anchor="middle">Review History,</text>
<text class="tl" x="217" y="95" text-anchor="middle">Meds &amp; Vitals</text>

<rect x="292" y="62" width="105" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="345" y="79" text-anchor="middle">Add Diagnosis</text>
<text class="ts" x="345" y="92" text-anchor="middle">(ICD-10)</text>
<text class="ts" x="345" y="105" text-anchor="middle">US-04</text>

<rect x="415" y="62" width="105" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="468" y="79" text-anchor="middle">Create</text>
<text class="tl" x="468" y="92" text-anchor="middle">Prescription</text>
<text class="ts" x="468" y="105" text-anchor="middle">US-06</text>

<!-- Gateway: Drug Allergy? -->
<polygon points="553,90 578,65 603,90 578,115" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="gl" x="578" y="86" text-anchor="middle">Drug</text>
<text class="gl" x="578" y="98" text-anchor="middle">Allergy?</text>

<rect x="630" y="62" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="685" y="82" text-anchor="middle">Confirm</text>
<text class="tl" x="685" y="95" text-anchor="middle">Prescription</text>

<rect x="760" y="62" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="815" y="79" text-anchor="middle">Review Lab</text>
<text class="tl" x="815" y="92" text-anchor="middle">Results</text>
<text class="ts" x="815" y="105" text-anchor="middle">US-10</text>

<!-- Gateway: Results OK? -->
<polygon points="900,90 925,65 950,90 925,115" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="gl" x="925" y="86" text-anchor="middle">Results</text>
<text class="gl" x="925" y="98" text-anchor="middle">OK?</text>

<!-- End: Consult Complete (YES) -->
<circle cx="1000" cy="90" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="1000" y="115" text-anchor="middle">Consult Complete</text>

<!-- Update Care Plan (NO) -->
<rect x="1050" y="62" width="120" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="1110" y="79" text-anchor="middle">Update Care Plan</text>
<text class="tl" x="1110" y="92" text-anchor="middle">/ Order Tests</text>

<!-- Loop back arc -->
<path d="M1110 62 L1110 38 L815 38 L815 62" fill="none" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="960" y="34">loop back</text>

<!-- ===== SYSTEM LANE ===== -->
<rect x="292" y="190" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="350" y="210" text-anchor="middle">Save Diagnosis</text>
<text class="tl" x="350" y="223" text-anchor="middle">&amp; Audit Log</text>
<text class="ts" x="350" y="235" text-anchor="middle">NFR-08</text>

<rect x="415" y="190" width="110" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="470" y="207" text-anchor="middle">Check Drug</text>
<text class="tl" x="470" y="220" text-anchor="middle">Interactions</text>
<text class="ts" x="470" y="232" text-anchor="middle">NFR-06</text>

<rect x="630" y="190" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="688" y="207" text-anchor="middle">Transmit Rx to</text>
<text class="tl" x="688" y="220" text-anchor="middle">Pharmacy API</text>
<text class="ts" x="688" y="232" text-anchor="middle">NFR-23</text>

<rect x="760" y="190" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="818" y="207" text-anchor="middle">Notify Doctor:</text>
<text class="tl" x="818" y="220" text-anchor="middle">Lab Results Ready</text>

<rect x="1050" y="190" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="1108" y="207" text-anchor="middle">Timestamp &amp;</text>
<text class="tl" x="1108" y="220" text-anchor="middle">Lock Record</text>
<text class="ts" x="1108" y="232" text-anchor="middle">NFR-21</text>

<!-- ===== LAB TECHNICIAN LANE ===== -->
<circle cx="135" cy="358" r="14" fill="white" stroke="#111" stroke-width="2"/>
<text class="tl" x="135" y="382" text-anchor="middle">Receive Order</text>

<rect x="162" y="330" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="220" y="350" text-anchor="middle">Process Blood</text>
<text class="tl" x="220" y="363" text-anchor="middle">Panel / Test</text>

<rect x="295" y="330" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="353" y="347" text-anchor="middle">Upload Results</text>
<text class="tl" x="353" y="360" text-anchor="middle">&amp; Key Values</text>
<text class="ts" x="353" y="373" text-anchor="middle">US-10</text>

<rect x="428" y="330" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="486" y="347" text-anchor="middle">Link to Lab</text>
<text class="tl" x="486" y="360" text-anchor="middle">Order &amp; Stamp</text>

<circle cx="595" cy="358" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="595" y="382" text-anchor="middle">Submitted</text>

<!-- ===== PHARMACY LANE ===== -->
<rect x="630" y="442" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="685" y="462" text-anchor="middle">Receive Rx</text>
<text class="tl" x="685" y="475" text-anchor="middle">via API</text>

<rect x="760" y="442" width="110" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="815" y="462" text-anchor="middle">Dispense</text>
<text class="tl" x="815" y="475" text-anchor="middle">Medication</text>

<rect x="890" y="442" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="948" y="462" text-anchor="middle">Notify Patient</text>
<text class="tl" x="948" y="475" text-anchor="middle">via SMS</text>

<circle cx="1060" cy="470" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="1060" y="494" text-anchor="middle">Fulfilled</text>

<!-- ===== FLOWS ===== -->
<line x1="149" y1="90" x2="162" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="272" y1="90" x2="292" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="345" y1="118" x2="345" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="397" y1="90" x2="415" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="468" y1="118" x2="468" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="520" y1="90" x2="553" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- No allergy -->
<line x1="603" y1="90" x2="630" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="614" y="85">No</text>
<!-- Yes allergy loop back -->
<path d="M578 65 L578 48 L468 48 L468 62" fill="none" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="495" y="44">Yes – revise</text>

<line x1="685" y1="118" x2="685" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="740" y1="90" x2="760" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="685" y1="242" x2="685" y2="420" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="818" y1="190" x2="818" y2="118" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="870" y1="90" x2="900" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- Yes OK -->
<line x1="950" y1="90" x2="986" y2="90" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="955" y="85">Yes</text>
<!-- No -->
<path d="M925 115 L925 148 L1110 148 L1110 118" fill="none" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="gl" x="935" y="144">No</text>
<line x1="1110" y1="118" x2="1110" y2="190" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<line x1="149" y1="358" x2="162" y2="358" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="277" y1="358" x2="295" y2="358" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="410" y1="358" x2="428" y2="358" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="543" y1="358" x2="581" y2="358" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<!-- Lab submitted → notify doctor (dashed message flow) -->
<path d="M595 344 L595 295 L818 295 L818 242" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>

<line x1="740" y1="470" x2="760" y2="470" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="870" y1="470" x2="890" y2="470" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="1005" y1="470" x2="1046" y2="470" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<text class="ttl" x="700" y="558" text-anchor="middle">BPMN 2: Clinical Consultation – Diagnosis, Prescription &amp; Lab Results (US-04 · US-06 · US-10)</text>
</svg>
