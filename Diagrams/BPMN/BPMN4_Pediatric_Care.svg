<text class="tl" x="220" y="83" text-anchor="middle">Calendar</text>
<text class="ts" x="220" y="96" text-anchor="middle">US-07</text>

<rect x="297" y="50" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="355" y="70" text-anchor="middle">Administer Vaccine</text>
<text class="tl" x="355" y="83" text-anchor="middle">&amp; Record Batch</text>

<rect x="432" y="50" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="490" y="67" text-anchor="middle">Record Growth</text>
<text class="tl" x="490" y="80" text-anchor="middle">Measurements</text>
<text class="ts" x="490" y="93" text-anchor="middle">US-08</text>

<rect x="567" y="50" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="625" y="67" text-anchor="middle">Create Neonatal</text>
<text class="tl" x="625" y="80" text-anchor="middle">Record + APGAR</text>
<text class="ts" x="625" y="93" text-anchor="middle">US-16</text>

<rect x="702" y="50" width="115" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="760" y="67" text-anchor="middle">Schedule Pap</text>
<text class="tl" x="760" y="80" text-anchor="middle">Test/Mammogram</text>
<text class="ts" x="760" y="93" text-anchor="middle">US-17</text>

<rect x="837" y="50" width="120" height="56" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="897" y="67" text-anchor="middle">Record Screening</text>
<text class="tl" x="897" y="80" text-anchor="middle">Result &amp; Next Date</text>

<circle cx="1020" cy="78" r="14" fill="white" stroke="#111" stroke-width="4"/>
<text class="tl" x="1020" y="103" text-anchor="middle">Records Updated</text>

<!-- ===== SYSTEM LANE ===== -->
<rect x="162" y="163" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="220" y="181" text-anchor="middle">Show Due Vaccines</text>
<text class="tl" x="220" y="194" text-anchor="middle">from Calendar</text>

<rect x="297" y="163" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="355" y="180" text-anchor="middle">Mark Administered</text>
<text class="tl" x="355" y="193" text-anchor="middle">&amp; Sched. Booster</text>

<rect x="432" y="163" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="490" y="180" text-anchor="middle">Calculate BMI &amp;</text>
<text class="tl" x="490" y="193" text-anchor="middle">Plot WHO Chart</text>
<text class="ts" x="490" y="206" text-anchor="middle">NFR-21</text>

<rect x="567" y="163" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="625" y="180" text-anchor="middle">Create Patient ID</text>
<text class="tl" x="625" y="193" text-anchor="middle">&amp; Vax Calendar</text>

<rect x="702" y="163" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="760" y="180" text-anchor="middle">Check Eligibility</text>
<text class="tl" x="760" y="193" text-anchor="middle">&amp; Overdue</text>
<text class="ts" x="760" y="206" text-anchor="middle">NFR-08</text>

<rect x="837" y="163" width="120" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="897" y="180" text-anchor="middle">Schedule Next</text>
<text class="tl" x="897" y="193" text-anchor="middle">Screening &amp; Audit</text>

<!-- ===== DOCTOR LANE ===== -->
<rect x="432" y="285" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="490" y="302" text-anchor="middle">Review Growth</text>
<text class="tl" x="490" y="315" text-anchor="middle">Chart &amp; Flag Dev.</text>

<rect x="567" y="285" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="625" y="302" text-anchor="middle">Review Neonatal</text>
<text class="tl" x="625" y="315" text-anchor="middle">Record &amp; Confirm</text>

<rect x="702" y="285" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="760" y="302" text-anchor="middle">Flag Abnormal</text>
<text class="tl" x="760" y="315" text-anchor="middle">&amp; Plan Follow-Up</text>

<!-- ===== PATIENT/PARENT LANE ===== -->
<rect x="297" y="402" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="355" y="419" text-anchor="middle">Receive Booster</text>
<text class="tl" x="355" y="432" text-anchor="middle">Reminder Email</text>

<rect x="702" y="402" width="115" height="52" rx="4" fill="white" stroke="#111" stroke-width="1.5"/>
<text class="tl" x="760" y="419" text-anchor="middle">Receive SMS</text>
<text class="tl" x="760" y="432" text-anchor="middle">Screening Reminder</text>

