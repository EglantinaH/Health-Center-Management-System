<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="540" viewBox="0 0 1400 540" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="1400" height="540" fill="white"/>
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
  .ll { font-size:12px; font-weight:bold; }
  .tl { font-size:11px; }
  .ts { font-size:10px; fill:#444; }
  .gl { font-size:10px; fill:#333; }
  .ttl { font-size:12px; font-weight:bold; }
</style>

<!-- Pool border -->
<rect x="30" y="15" width="1355" height="515" rx="4" fill="none" stroke="#111" stroke-width="2"/>
<rect x="30" y="15" width="32" height="515" fill="#ddd" stroke="#111" stroke-width="1"/>
<text class="ll" x="46" y="273" text-anchor="middle" transform="rotate(-90,46,273)">BPMN 4: Pediatric &amp; Specialist Care – Vaccination, Growth, Neonatal &amp; Screening</text>

<!-- Nurse lane y=15..140 -->
<rect x="62" y="15" width="1323" height="125" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="15" width="52" height="125" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="78" text-anchor="middle" transform="rotate(-90,88,78)">Nurse</text>

<!-- System lane y=140..265 -->
<rect x="62" y="140" width="1323" height="125" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="140" width="52" height="125" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<rect x="62" y="140" width="52" height="125" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="203" text-anchor="middle" transform="rotate(-90,88,203)">System</text>

<!-- Doctor lane y=265..380 -->
<rect x="62" y="265" width="1323" height="115" fill="none" stroke="#111" stroke-width="1"/>
<rect x="62" y="265" width="52" height="115" fill="#f0f0f0" stroke="#111" stroke-width="0.8"/>
<text class="ll" x="88" y="323" text-anchor="middle" transform="rotate(-90,88,323)">Doctor</text>

