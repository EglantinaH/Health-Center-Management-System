<line x1="957" y1="78" x2="1006" y2="78" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<text class="ttl" x="700" y="530" text-anchor="middle">BPMN 4: Pediatric &amp; Specialist Care – Vaccination, Growth, Neonatal &amp; Screening (US-07 · US-08 · US-16 · US-17)</text>
